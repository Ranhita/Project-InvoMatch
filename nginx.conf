# Production Nginx Reverse Proxy Configuration for InvoMatch
# Serve static frontend files and reverse proxy API calls to FastAPI Uvicorn backend

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    server {
        listen       80;
        server_name  localhost;

        # Frontend: Root folder serving static React built assets
        location / {
            root   C:/Users/ranhi/.gemini/antigravity-ide/scratch/frontend/dist;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Backend: Reverse proxy for FastAPI routes
        location /api {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for large PDF parsing / OCR uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            client_max_body_size 10M; # Match uploader 10MB limit
        }

        # Error page redirects
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
